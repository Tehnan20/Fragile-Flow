name: Deploy Unity Server (Auto-Build + Mirror KCP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.ALI_ACR_REGISTRY }}/${{ secrets.ALI_ACR_NAMESPACE }}/${{ secrets.ALI_ACR_REPO }}
  UNITY_VERSION: 6000.2.15f1 # Explicitly setting your Unity version

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      # --- NEW: CACHE UNITY LIBRARY ---
      # This speeds up future builds massively by caching the Library folder
      - name: Cache Unity Library
        uses: actions/cache@v3
        with:
          # Use single quotes because of the space in the folder name
          path: "Fragile Flow/Library"
          key: Library-${{ hashFiles('Fragile Flow/Assets/**', 'Fragile Flow/Packages/**', 'Fragile Flow/ProjectSettings/**') }}
          restore-keys: |
            Library-

      # --- NEW: BUILD UNITY LINUX SERVER ---
      - name: Build Unity Server (GameCI)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneLinux64Server
          versioning: Semantic
          projectPath: "Fragile Flow"
          buildName: MyGameServer # <--- Forces Unity to name the output MyGameServer

      # --- NEW: PREPARE FILES FOR DOCKER ---
      - name: Rename Build Folder for Dockerfile
        run: |
          # 1. Take ownership of the files created by the GameCI docker container
          sudo chown -R $USER:$USER build

          # 2. Rename the folder so your Dockerfile can find it
          mv build/StandaloneLinux64Server server_build

          # 3. Print the folder contents to the log so we can see exactly what Unity built!
          echo "--- Contents of server_build ---"
          ls -la server_build

          # 4. Safely ensure the executable matches your Dockerfile CMD ("MyGameServer.x86_64")
          # If Unity generated "MyGameServer" (no extension), rename it.
          if [ -f server_build/MyGameServer ]; then
            echo "Renaming MyGameServer to MyGameServer.x86_64"
            mv server_build/MyGameServer server_build/MyGameServer.x86_64
          fi

      # 1) Login to Alibaba ACR
      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.ALI_ACR_REGISTRY }}
          username: ${{ secrets.ALI_ACR_USERNAME }}
          password: ${{ secrets.ALI_ACR_PASSWORD }}

      # 2) Build & push docker image
      - name: Build and Push Docker Image
        run: |
          docker build -t $IMAGE_NAME:latest .
          docker push $IMAGE_NAME:latest

      # 3) Deploy to ECS via SSH
      - name: Deploy to ECS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          # key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Login to ACR on server
            echo "${{ secrets.ALI_ACR_PASSWORD }}" | sudo docker login ${{ secrets.ALI_ACR_REGISTRY }} \
              -u ${{ secrets.ALI_ACR_USERNAME }} --password-stdin

            # Pull the new image
            sudo docker pull ${{ env.IMAGE_NAME }}:latest

            # Stop and remove old container
            sudo docker stop unity-server || true
            sudo docker rm unity-server || true

            # Run new container: Telepathy TCP on 7777
            sudo docker run -d \
              --name unity-server \
              --restart always \
              -p 7777:7777/tcp \
              -p 7777:7777/udp \
              ${{ env.IMAGE_NAME }}:latest

            # Show status + recent logs
            sudo docker ps | grep uat-unity-server || true
            sudo docker logs --tail 80 uat-unity-server || true

            # Cleanup old images
            sudo docker image prune -f
